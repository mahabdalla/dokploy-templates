version: "3.8"
services:
  zeroclaw:
    image: ghcr.io/zeroclaw-labs/zeroclaw:v0.6.9-debian
    restart: unless-stopped
    command: ["daemon"]
    environment:
      # Core
      - PROVIDER=${PROVIDER:-openai}
      - ZEROCLAW_ALLOW_PUBLIC_BIND=true
      - ZEROCLAW_GATEWAY_PORT=42617
      - ZEROCLAW_GATEWAY_HOST=0.0.0.0
      - ZEROCLAW_WORKSPACE=/zeroclaw-data/workspace
      - ZEROCLAW_REQUIRE_PAIRING=false
      # AI Providers
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY}
      - FIREWORKS_API_KEY=${FIREWORKS_API_KEY}
      - NOVITA_API_KEY=${NOVITA_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - VENICE_API_KEY=${VENICE_API_KEY}
      - GLM_API_KEY=${GLM_API_KEY}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - VERCEL_TOKEN=${VERCEL_TOKEN}
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - QIANFAN_API_KEY=${QIANFAN_API_KEY}
      - QIANFAN_SECRET_KEY=${QIANFAN_SECRET_KEY}
      # Channels
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - MATRIX_ACCESS_TOKEN=${MATRIX_ACCESS_TOKEN}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - DINGTALK_APP_KEY=${DINGTALK_APP_KEY}
      - DINGTALK_APP_SECRET=${DINGTALK_APP_SECRET}
      - QQ_APP_ID=${QQ_APP_ID}
      - QQ_APP_SECRET=${QQ_APP_SECRET}
      - MATTERMOST_URL=${MATTERMOST_URL}
      - MATTERMOST_TOKEN=${MATTERMOST_TOKEN}
      - LARK_APP_ID=${LARK_APP_ID}
      - LARK_APP_SECRET=${LARK_APP_SECRET}
      # Tools
      - BRAVE_API_KEY=${BRAVE_API_KEY}
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY}
    volumes:
      - zeroclaw-data:/zeroclaw-data
    expose:
      - 42617

volumes:
  zeroclaw-data: {}
